<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>granite-draw-sparkline demo</title>

  <script type="module" src="../granite-draw-sparkline.js"></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 550px;
      margin: 0 auto;
      padding: 1rem;
    }
    granite-draw-sparkline {
      width: 100%;
      height: 300px;
      border: solid 1px grey;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-all;
      background: #f5f5f5;
      padding: 0.5rem;
      min-height: 3rem;
    }
  </style>
</head>

<body>
  <h1><code>granite-draw-sparkline</code></h1>

  <h3>Basic usage</h3>
  <p>Draw inside the box with mouse, touch or pen. Each new stroke starts a new sparkline.</p>

  <granite-draw-sparkline line-width="2" stroke-style="#1976d2"></granite-draw-sparkline>

  <p><button id="clear">Clear</button></p>

  <h3>Path</h3>
  <pre id="output">(draw something)</pre>

  <script>
    const sparkline = document.querySelector('granite-draw-sparkline');
    const output = document.getElementById('output');

    sparkline.addEventListener('changed', (evt) => {
      output.textContent = JSON.stringify(
        evt.detail.map((point) => ({ x: Math.round(point.x), y: Math.round(point.y) }))
      );
    });

    document.getElementById('clear').addEventListener('click', () => {
      sparkline.clear();
      output.textContent = '(draw something)';
    });
  </script>
</body>
</html>
